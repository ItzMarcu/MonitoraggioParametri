<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione - Monitoraggio Parametri</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-gray-800 rounded-xl p-6 shadow-xl border border-gray-700">
        <header class="mb-6 text-center">
            <h1 class="text-2xl font-bold text-white">Crea Account</h1>
            <p class="text-gray-400 text-sm mt-1">Registra un nuovo profilo per il tuo registro biometrico</p>
        </header>

        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-xs font-medium uppercase tracking-wider text-gray-400 mb-1">Username</label>
                <input type="text" id="usernameInput" required placeholder="Scegli un username"
                    class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500">
            </div>
            <div>
                <label class="block text-xs font-medium uppercase tracking-wider text-gray-400 mb-1">Password</label>
                <input type="password" id="passwordInput" required placeholder="••••••••"
                    class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500">
            </div>
            <button type="submit" 
                class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-medium py-2.5 px-4 rounded-lg transition duration-200 shadow-md mt-2">
                Registrati ed Entra
            </button>
        </form>

        <div class="mt-4 text-center text-sm">
            <span class="text-gray-400">Hai già un account?</span>
            <a href="index.html" class="text-indigo-400 hover:text-indigo-300 font-medium ml-1 transition">Accedi qui</a>
        </div>
    </div>
</body>
<script src="registrati.js"></script>
</html>
