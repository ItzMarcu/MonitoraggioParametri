<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoraggio Parametri</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen">

    <div class="max-w-4xl mx-auto p-6">
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-bold tracking-tight text-white">Dati Cuore & Parametri</h1>
            <p class="text-gray-400 text-sm mt-2">Pannello personale di monitoraggio</p>
        </header>

        <section class="bg-gray-800 rounded-xl p-6 shadow-xl border border-gray-700 mb-10">
            <h2 class="text-xl font-semibold mb-4 text-white">Inserisci Nuova Registrazione</h2>
            
            <form id="dataForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-medium uppercase tracking-wider text-gray-400 mb-1">Data e Ora</label>
                    <input type="datetime-local" id="dataInput" required
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-medium uppercase tracking-wider text-gray-400 mb-1">Frequenza Cardiaca (BPM)</label>
                    <input type="number" id="bpmInput" placeholder="es. 72"
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-medium uppercase tracking-wider text-gray-400 mb-1">Pressione (Sistolica)</label>
                    <input type="number" id="pressioneInput" placeholder="es. 120"
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-medium uppercase tracking-wider text-gray-400 mb-1">Saturazione (SpO2 %)</label>
                    <input type="number" id="saturazioneInput" placeholder="es. 98"
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500">
                </div>
                <div class="md:col-span-2 mt-2">
                    <button type="submit" 
                        class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2.5 px-4 rounded-lg transition duration-200 shadow-md">
                        Salva Registrazione
                    </button>
                </div>
            </form>
        </section>

        <section>
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-semibold text-white">Storico Registrazioni</h2>
                <button onclick="caricaDati()" class="text-xs bg-gray-700 hover:bg-gray-600 px-3 py-1.5 rounded-md transition text-gray-300">
                    Aggiorna
                </button>
            </div>
            
            <div id="cardsContainer" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                </div>
        </section>
    </div>
</body>
<script src="app.js"></script>
</html>
